spring:
  config:
    import: optional:file:.env[.properties]

  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?ssl-mode=REQUIRED
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        model: gpt-4o-mini
  jpa:
    properties:
      hibernate:
        default_batch_fetch_size: 100
    hibernate:
      ddl-auto: validate
    show-sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  flyway:
    locations: classpath:database/migration
    baseline-on-migrate: true
    enabled: true
    validate-on-migrate: true
    baseline-version: 0
  mongodb:
    uri: ${MONGODB_URI}


jwt:
  secret-key: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

sepay:
  account-number: ${SEPAY_ACCOUNT_NUMBER}      # bank account linked in SePay
  account-name:   ${SEPAY_ACCOUNT_NAME}        # holder name (for display)
  bank:           ${SEPAY_BANK}                # VietQR bank short name, e.g. "Vietcombank", "MBBank", "TPBank"
  api-key:        ${SEPAY_API_KEY}             # webhook key; SePay sends "Authorization: Apikey <key>"
  prefix:         MOVIE                         # transfer-content prefix => content is "MOVIE<orderCode>"
  qr-base-url:    https://qr.sepay.vn/img

storage:
  image:
    allowed-types: image/jpeg,image/jpg,image/png,image/gif,image/webp
    allowed-extensions: jpg,jpeg,png,gif,webp
    max-file-size: 5242880 # 5MB in bytes